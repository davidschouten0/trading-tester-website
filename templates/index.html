<!DOCTYPE html>


<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <title>Trading Strategy Tester</title>
</head>


<body>
    <header>
        <div style="text-align: center;"> <strong> Pingu Trader 🐧 </strong> </div>
    </header>

    <main>

        <p>Select your parameters below to run the backtest.</p>

        {% if error_message %}
            <div style="background-color: #fee2e2; color: #dc2626; padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center; border: 1px solid #f87171;">
                <strong>Fehler:</strong> {{ error_message }}
            </div>
        {% endif %}

        <form action="/backtest" method="POST">

            <div>
                <label for="ticker">Ticker Symbol:</label>
                <input type="text" id="ticker" name="ticker" list="ticker-options" placeholder="AAPL" required autocomplete="off">
                <datalist id="ticker-options"></datalist>
            </div>
            <script>
                //make the ticker interactive

                const tickerInput = document.getElementById('ticker');
                const datalist = document.getElementById('ticker-options');

                //when pressing a letter
                tickerInput.addEventListener('input', async function() {
                    const query = tickerInput.value;

                    //start querying after 2 letters
                    if (query.length < 2) {
                        datalist.innerHTML = ''; 
                        return;
                    }

                    //send request to backend via HTTPS
                    const response = await fetch(`/search_ticker?q=${query}`);
                    const tickers = await response.json();

                    //clear old list, add new elements
                    datalist.innerHTML = '';
                    tickers.forEach(ticker => {
                        const option = document.createElement('option');
                        option.value = ticker;
                        datalist.appendChild(option);
                    });
                });
            </script>

            <br>

            <div>
                <label for="strategy">Trading Strategy:</label>
                <select id="strategy" name="strategy">
                    <option value="ADX">ADX (Average Directional Index)</option>
                    <option value="Aroon">Aroon (Aroon Indicator)</option>
                    <option value="ATRBreakout">ATRBreakout (Average True Range Breakout)</option>
                    <option value="BollingerSqueeze">BollingerSqueeze (Bollinger Bands Squeeze)</option>
                    <option value="CMO">CMO (Chande Momentum Oscillator)</option>
                    <option value="Donchian">Donchian (Donchian Channels)</option>
                    <option value="DPO">DPO (Detrended Price Oscillator)</option>
                    <option value="HMACross">HMACross (Hull Moving Average Cross)</option>
                    <option value="Ichimoku">Ichimoku (Ichimoku Cloud)</option>
                    <option value="Kama">Kama (Kaufman's Adaptive Moving Average)</option>
                    <option value="Keltner">Keltner (Keltner Channels)</option>
                    <option value="MACD">MACD (Moving Average Convergence Divergence)</option>
                    <option value="MACDPullback">MACDPullback (MACD Pullback Strategy)</option>
                    <option value="MACDSignalZero">MACDSignalZero (MACD Signal Zero Cross)</option>
                    <option value="MACDZero">MACDZero (MACD Zero Cross)</option>
                    <option value="MeanReversion">MeanReversion (Mean Reversion Strategy)</option>
                    <option value="Momentum">Momentum (Momentum Cross)</option>
                    <option value="MovingAverage">MovingAverage (Moving Average Cross)</option>
                    <option value="RSI">RSI (Relative Strength Index)</option>
                    <option value="RVI">RVI (Relative Vigor Index)</option>
                    <option value="SAR">SAR (Parabolic SAR Cross)</option>
                    <option value="SMA" selected>SMA (Simple Moving Average)</option>
                    <option value="Stochastic">Stochastic (Stochastic Oscillator)</option>
                    <option value="TEMA">TEMA (Triple Exponential Moving Average)</option>
                    <option value="TRIX">TRIX (Triple Exponential Average)</option>
                    <option value="UltimateOscillator">UltimateOscillator (Ultimate Oscillator)</option>
                    <option value="VWAP">VWAP (Volume Weighted Average Price)</option>
                    <option value="Williams">Williams (Williams %R)</option>
                </select>
            </div>

            <br>

            <div>
                <label for="cash">Starting Cash ($):</label>
                <input type="number" id="cash" placeholder="100000" required autocomplete="off" min="1" max="10000000">
            </div>

            <br>

            <div>
                <label for="equity_per_trade">How much equity (in %) is used per trade:</label>
                <input type="number" id="equity_per_trade" placeholder="5" required autocomplete="off" min="0.01" max="100" step="any">
            </div>

            <br>

            <button type="submit">Run Backtest</button>

        </form>

    </main>

    <footer>
        <p>Impressum | Kontakt | © 2026</p>
    </footer>

</body>


</html>
